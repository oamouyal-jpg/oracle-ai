# Render Blueprint — oracle-api + oracle-ai (frontend)
#
# API env (set in dashboard): OPENAI_API_KEY, DATABASE_URL, CORS_ORIGIN
# Web env: NEXT_PUBLIC_API_URL=https://YOUR-oracle-api.onrender.com
#          (browser calls API directly — saves memory vs Next proxy)

services:
  - type: web
    name: oracle-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run db:deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "4000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEV_USER_ID
        value: dev-user
      # Web push (VAPID) — set these in the dashboard. Generate with:
      #   npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:notify@oracle.app
      # Shared secret guarding POST /api/notifications/run-scheduler (used by the cron below)
      - key: SCHEDULER_SECRET
        sync: false
      # In-process scheduler runs every minute. On the free plan the web service
      # sleeps when idle, so the cron job below also drives delivery as a backup.
      - key: SCHEDULER_ENABLED
        value: "true"

  - type: web
    name: oracle-ai
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build -w @oracle/web
    startCommand: node apps/web/scripts/render-start.mjs
    # Requires NEXT_PUBLIC_API_URL on this service (browser -> oracle-api directly)
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # Backup delivery: pings the scheduler every 5 minutes so push nudges fire even
  # when the free-plan web service has gone to sleep. Set API_BASE_URL + SCHEDULER_SECRET.
  - type: cron
    name: oracle-scheduler
    runtime: node
    rootDir: apps/api
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: npm install
    command: >
      node -e "fetch(process.env.API_BASE_URL + '/api/notifications/run-scheduler', { method: 'POST', headers: { 'x-scheduler-secret': process.env.SCHEDULER_SECRET } }).then(r => r.text()).then(t => console.log('scheduler:', t)).catch(e => { console.error(e); process.exit(1); })"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: API_BASE_URL
        sync: false
      - key: SCHEDULER_SECRET
        sync: false
